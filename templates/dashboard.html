<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Bem-vindo, {{ user }}!</h1>

        {% if mensagem %}
            <p class="mensagem">{{ mensagem }}</p>
        {% endif %}

        <p><a href="{{ url_for('alterar_senha') }}">Alterar senha</a></p>
        <p><a href="{{ url_for('logout') }}">Sair</a></p>
        <p><a href="{{ url_for('index') }}">Voltar para Início</a></p>
    </div>
</body>
</html>
